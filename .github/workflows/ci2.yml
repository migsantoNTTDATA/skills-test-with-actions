# =========================================================
# Workflow de Integración Continua (CI)
# =========================================================
# Este workflow ejecuta validaciones automáticas
# cuando hay cambios en la rama principal.
#
# Funciones:
# - Descargar el repositorio
# - Instalar herramientas de lint para Python
# - Validar código Python
# =========================================================

# Nombre visible del workflow en GitHub Actions
name: CI

# =========================================================
# Eventos que disparan el workflow
# =========================================================
on:

  # Ejecutar al hacer push a main
  push:
    branches:
      - main

  # Ejecutar al crear o actualizar Pull Requests
  pull_request:
    branches:
      - main

  # Permite ejecutar manualmente desde GitHub
  workflow_dispatch:

# =========================================================
# Trabajos (jobs)
# =========================================================
jobs:

  # Nombre del job
  build:

    # Sistema operativo de la máquina virtual
    runs-on: ubuntu-latest

    # =====================================================
    # Pasos del job
    # =====================================================
    steps:

      # ---------------------------------------------------
      # Descargar el código del repositorio
      # ---------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Configurar Python
      # ---------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      # ---------------------------------------------------
      # Instalar dependencias
      # ---------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint

      # ---------------------------------------------------
      # Ejecutar análisis de código Python
      # ---------------------------------------------------
      - name: Run linting
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          pylint **/*.py --exit-zero
